<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>trendlooot - Navbar Extension</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- CORE BASE SETTINGS --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            padding-top: 80px; 
            background-color: #ffffff;
        }

        .tl-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* --- NAVBAR STYLES --- */
        .tl-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background-color: transparent;
            transition: background-color 0.4s ease, padding 0.4s ease, box-shadow 0.4s ease;
            padding: 20px 0;
        }

        .tl-header.scrolled {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 15px 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(10px);
        }

        .navbar-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Logo */
        .logo a {
            font-size: 1.6rem;
            font-weight: 700;
            color: #111;
            text-decoration: none;
            letter-spacing: 0.5px;
        }

        .logo a span {
            color: #ff3e6c; 
        }

        /* Navigation Links */
        .nav-menu {
            display: flex;
            align-items: center;
            list-style: none;
            gap: 35px;
        }

        .nav-item a {
            text-decoration: none;
            color: #1a1a1a;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.3s ease;
            position: relative;
            padding: 5px 0;
        }

        .nav-item a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background-color: #ff3e6c;
            transition: width 0.3s ease;
        }

        .nav-item a:hover {
            color: #ff3e6c;
        }

        .nav-item a:hover::after {
            width: 100%;
        }

        /* Action Buttons */
        .nav-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .action-btn {
            display: flex;
            align-items: center;
            text-decoration: none;
            background: none;
            border: none;
            color: #1a1a1a;
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.3s ease;
            position: relative;
        }

        .action-btn:hover {
            color: #ff3e6c;
        }

        /* Shop Badge Style */
        .action-btn .cart-count {
            position: absolute;
            top: -12px;
            right: -32px; 
            background-color: #ff3e6c;
            color: #fff;
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 4px; /* হালকা রাউন্ডেড কোণা */
            font-weight: 600;
            line-height: 1.2;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Hamburger Menu Icon */
        .hamburger {
            display: none;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 1.4rem;
            color: #111;
        }

        /* --- RESPONSIVE MEDIA QUERY --- */
        @media (max-width: 768px) {
            body {
                padding-top: 70px;
            }

            .hamburger {
                display: block;
                order: 3;
            }

            /* এখানে স্পেসিং বাড়ানো হয়েছে যেন স্ক্রিনের সাথে লেগে না যায় */
            .nav-actions {
                order: 2;
                margin-left: auto;
                margin-right: 45px; /* ৪৫ পিক্সেল গ্যাপ দেওয়া হয়েছে নিরাপদ দূরত্বের জন্য */
                gap: 12px;
            }

            .nav-menu {
                position: fixed;
                top: -100%;
                left: 0;
                width: 100%;
                background-color: #ffffff;
                flex-direction: column;
                text-align: center;
                gap: 0;
                padding: 30px 0;
                box-shadow: 0 10px 25px rgba(0,0,0,0.05);
                z-index: 999;
                opacity: 0;
                visibility: hidden;
                transition: top 0.5s cubic-bezier(0.77, 0.2, 0.05, 1.0), opacity 0.4s ease, visibility 0.4s ease;
            }

            .nav-menu.open {
                top: 70px;
                opacity: 1;
                visibility: visible;
            }

            .nav-item {
                width: 100%;
                padding: 15px 0;
            }

            .nav-item a {
                font-size: 1.1rem;
                display: block;
            }
            
            .nav-item a::after {
                display: none;
            }
        }
    </style>
</head>
<body>

    <header class="tl-header" id="tl-header">
        <div class="tl-container">
            <nav class="navbar-wrapper">
                
                <div class="logo">
                    <a href="https://dev-trendloot-online-store.pantheonsite.io/">trend<span>looot</span></a>
                </div>

                <ul class="nav-menu" id="nav-menu">
                    <li class="nav-item"><a href="https://dev-trendloot-online-store.pantheonsite.io/">Home</a></li>
                    <li class="nav-item"><a href="https://dev-trendloot-online-store.pantheonsite.io/shop/">Shop</a></li>
                    <li class="nav-item"><a href="https://dev-trendloot-online-store.pantheonsite.io/about/">About</a></li>
                    <li class="nav-item"><a href="https://dev-trendloot-online-store.pantheonsite.io/faq/">FAQ</a></li>
                </ul>

                <div class="nav-actions">
                    <a href="https://dev-trendloot-online-store.pantheonsite.io/shop/" class="action-btn" aria-label="Cart">
                        <i class="fas fa-shopping-bag"></i>
                        <span class="cart-count">Shop</span>
                    </a>
                </div>

                <button class="hamburger" id="menu-toggle" aria-label="Toggle Navigation">
                    <i class="fas fa-bars"></i>
                </button>

            </nav>
        </div>
    </header>

    <script>
        /* --- SCROLL EFFECT JS --- */
        const header = document.getElementById('tl-header');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        /* --- MOBILE MENU TOGGLE JS --- */
        const menuToggle = document.getElementById('menu-toggle');
        const navMenu = document.getElementById('nav-menu');
        const toggleIcon = menuToggle.querySelector('i');

        menuToggle.addEventListener('click', () => {
            navMenu.classList.toggle('open');
            
            if (navMenu.classList.contains('open')) {
                toggleIcon.classList.remove('fa-bars');
                toggleIcon.classList.add('fa-times');
            } else {
                toggleIcon.classList.remove('fa-times');
                toggleIcon.classList.add('fa-bars');
            }
        });

        const navLinks = document.querySelectorAll('.nav-item a');
        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                navMenu.classList.remove('open');
                toggleIcon.classList.remove('fa-times');
                toggleIcon.classList.add('fa-bars');
            });
        });
    </script>
</body>
</html>
